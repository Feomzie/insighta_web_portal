<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profiles - Insighta Labs+</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">
    
    <!-- NAVIGATION BAR -->
    <nav class="bg-white border-b border-gray-200 fixed w-full z-30 top-0">
        <div class="px-3 py-3 lg:px-5 lg:pl-3 flex items-center justify-between">
            <a href="/dashboard.html" class="text-xl font-bold text-blue-600">Insighta Labs+</a>
            <div class="flex items-center space-x-4">
                <a href="/dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
                <a href="/profiles.html" class="text-gray-600 hover:text-blue-600">Profiles</a>
                <a href="/account.html" class="flex items-center text-sm font-medium text-gray-900 rounded-full hover:text-blue-600">
                    <img id="nav-avatar" class="w-8 h-8 mr-2 rounded-full" src="" alt="user">
                    <span id="nav-username">Loading...</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="pt-20 p-6">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Profile Intelligence</h1>
                <!-- admin-only class handles the role check -->
                <button class="admin-only bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Add Profile</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <input type="text" id="searchInput" placeholder="Natural language search..." class="border p-2 rounded col-span-2">
                <select id="genderFilter" class="border p-2 rounded">
                    <option value="">All Genders</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <button onclick="applyFilters()" class="bg-gray-800 text-white p-2 rounded hover:bg-black">Search</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="profilesTable">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-3 text-sm font-semibold">Name</th>
                            <th class="p-3 text-sm font-semibold">Gender</th>
                            <th class="p-3 text-sm font-semibold">Age</th>
                            <th class="p-3 text-sm font-semibold">Country</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200"></tbody>
                </table>
            </div>

            <div class="mt-6 flex justify-between items-center" id="pagination">
                <span class="text-sm text-gray-600" id="recordCount">Showing 0 records</span>
                <div class="flex space-x-2">
                    <button id="prevBtn" class="px-3 py-1 border rounded disabled:opacity-50">Prev</button>
                    <button id="nextBtn" class="px-3 py-1 border rounded disabled:opacity-50">Next</button>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentPage = 1;

        async function loadPageData() {
            const gender = document.getElementById('genderFilter').value;
            const q = document.getElementById('searchInput').value;
            
            let url = `/api/profiles?page=${currentPage}&limit=10`;
            if (gender) url += `&gender=${gender}`;
            if (q) url = `/api/profiles/search?q=${encodeURIComponent(q)}&page=${currentPage}`;

            const data = await apiFetch(url);
            if (!data) return;

            const tbody = document.querySelector('#profilesTable tbody');
            tbody.innerHTML = data.data.map(p => `
                <tr>
                    <td class="p-3 font-medium">${p.name}</td>
                    <td class="p-3 capitalize">${p.gender}</td>
                    <td class="p-3">${p.age}</td>
                    <td class="p-3">${p.country_name}</td>
                </tr>
            `).join('');

            document.getElementById('recordCount').innerText = `Page ${data.page} of ${data.total_pages}`;
            document.getElementById('prevBtn').disabled = !data.links.prev;
            document.getElementById('nextBtn').disabled = !data.links.next;
        }

        function applyFilters() { currentPage = 1; loadPageData(); }
        document.getElementById('prevBtn').onclick = () => { currentPage--; loadPageData(); };
        document.getElementById('nextBtn').onclick = () => { currentPage++; loadPageData(); };
    </script>
</body>
</html>
