<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="text-center">
        <p class="text-gray-600 text-sm">Completing sign in...</p>
    </div>
    <script src="js/api.js"></script>
    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');

            if (!accessToken || !refreshToken) {
                window.location.href = '/index.html';
                return;
            }

            // Call the backend to set HTTP-only cookies properly
            // This fetch goes to the same backend origin, so cookies will stick
            const result = await apiFetch(
                `/auth/session?access_token=${encodeURIComponent(accessToken)}&refresh_token=${encodeURIComponent(refreshToken)}`
            );

            if (result) {
                window.location.href = '/dashboard.html';
            } else {
                window.location.href = '/index.html';
            }
        })();
    </script>
</body>
</html>
