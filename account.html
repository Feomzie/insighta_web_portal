<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account - Insighta Labs+</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">
    
    <!-- NAVIGATION BAR -->
    <nav class="bg-white border-b border-gray-200 fixed w-full z-30 top-0">
        <div class="px-3 py-3 lg:px-5 lg:pl-3 flex items-center justify-between">
            <a href="/dashboard.html" class="text-xl font-bold text-blue-600">Insighta Labs+</a>
            <div class="flex items-center space-x-4">
                <a href="/dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
                <a href="/profiles.html" class="text-gray-600 hover:text-blue-600">Profiles</a>
                <a href="/account.html" class="flex items-center text-sm font-medium text-gray-900 rounded-full hover:text-blue-600">
                    <img id="nav-avatar" class="w-8 h-8 mr-2 rounded-full" src="" alt="user">
                    <span id="nav-username">Loading...</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="pt-20 p-6">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white shadow-sm border border-gray-200 rounded-lg overflow-hidden">
                <div class="h-24 bg-gradient-to-r from-blue-500 to-blue-700"></div>
                
                <div class="px-6 pb-6">
                    <div class="relative flex justify-between items-end -mt-12 mb-6">
                        <img id="acc-avatar" class="w-24 h-24 rounded-full border-4 border-white shadow-md bg-white" src="" alt="Profile">
                        <span id="acc-role" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-gray-100 text-gray-700"></span>
                    </div>

                    <div class="space-y-1">
                        <h1 id="acc-username" class="text-2xl font-bold text-gray-900"></h1>
                        <p id="acc-email" class="text-gray-500"></p>
                    </div>

                    <div class="mt-8 border-t pt-6">
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">System Identity</h3>
                        <dl class="grid grid-cols-1 gap-x-4 gap-y-6 sm:grid-cols-2">
                            <div>
                                <dt class="text-sm font-medium text-gray-500">GitHub ID</dt>
                                <dd id="acc-github" class="mt-1 text-sm text-gray-900 font-mono"></dd>
                            </div>
                        </dl>
                    </div>

                    <div class="mt-10 pt-6 border-t flex flex-col space-y-3">
                        <button onclick="handleLogout()" class="w-full py-2 px-4 border border-red-300 rounded-md text-red-700 bg-white hover:bg-red-50">
                            Sign Out of Insighta Labs+
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function loadPageData() {
            document.getElementById('acc-avatar').src = currentUser.avatar_url || `https://ui-avatars.com/api/?name=${currentUser.username}`;
            document.getElementById('acc-role').innerText = currentUser.role;
            document.getElementById('acc-username').innerText = currentUser.username;
            document.getElementById('acc-email').innerText = currentUser.email || 'No email provided';
            document.getElementById('acc-github').innerText = currentUser.id; // Using internal ID
        }

        async function handleLogout() {
            if (!confirm("Are you sure you want to sign out?")) return;
            await apiFetch('/auth/logout', { method: 'POST' });
            window.location.href = "/index.html";
        }
    </script>
</body>
</html>
